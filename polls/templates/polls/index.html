{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişilik Testi Merkezi</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>
    <main class="container">
        <h1>Kişilik Testi Merkezi</h1>
        
        <div class="category-grid">
            {% if categories %}
                {% for category in categories %}
                    <a href="{% url 'polls:detail' category.id %}" class="category-card">
                        <h2>{{ category.name }}</h2>
                        <p>{{ category.description }}</p>
                    </a>
                {% endfor %}
            {% else %}
                <p>Henüz test eklenmemiş.</p>
            {% endif %}
        </div>
    </main>
</body>
</html>
