{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sonucun!</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="result-header">
                <p style="color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 10px;">Test Sonucun</p>
                <h1 class="result-title">{{ result.title }}</h1>
            </div>

            <div class="result-avatar" style="width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #9b51e0); display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: bold; color: white; margin: 0 auto 20px auto; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4);">
                {{ result.title|slice:":1" }}
            </div>

            <div class="result-description">
                {{ result.description }}
            </div>

            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <a href="{% url 'polls:detail' result.category.id %}" class="btn" style="background: rgba(255,255,255,0.1); flex: 1;">Yeniden Çöz</a>
                <a href="{% url 'polls:index' %}" class="btn" style="flex: 2;">Testlere Dön</a>
            </div>
        </div>

        <div class="back-link">
            <p style="color: var(--text-secondary); text-align: center;">Kişilik Testi Merkezi</p>
        </div>
    </main>
</body>
</html>
