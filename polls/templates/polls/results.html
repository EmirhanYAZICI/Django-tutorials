{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sonucun!</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="result-header">
                <p style="color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 10px;">Test Sonucun</p>
                <h1 class="result-title">{{ result.title }}</h1>
            </div>

            {% if result.image_url %}
                <img src="{{ result.image_url }}" alt="{{ result.title }}" class="result-image">
            {% endif %}

            <div class="result-description">
                {{ result.description }}
            </div>

            <a href="{% url 'polls:index' %}" class="btn">Başka Bir Test Çöz</a>
        </div>

        <div class="back-link">
            <p style="color: var(--text-secondary); text-align: center;">Kişilik Testi Merkezi - Onedio Tarzı</p>
        </div>
    </main>
</body>
</html>
